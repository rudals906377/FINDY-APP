<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FINDY 후기</title>
  <style>
    :root {
      --bg: #f6f6f6;
      --surface: #ffffff;
      --card: #ffffff;
      --text: #B37433;
      --muted: #8a8178;
      --line: #e8ddd0;
      --accent: #B37433;
      --accent-soft: #f6ede3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR";
      background: #dcdcdc;
      color: var(--text);
    }

    .frame {
      max-width: 1080px;
      margin: 24px auto;
      background: var(--surface);
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 28px 56px 0;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
    }

    .btn {
      border: 1px solid var(--accent);
      padding: 10px 18px;
      border-radius: 999px;
      background: white;
      color: var(--accent);
      cursor: pointer;
    }

    .hero {
      padding: 130px 56px 0;
      text-align: center;
    }

    .hero h1 {
      font-size: 64px;
      margin: 0;
    }

    .hero p {
      color: var(--muted);
      margin-top: 10px;
    }

    .grid {
      margin: 150px auto;
      width: min(760px, 90%);
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      background: white;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 24px rgba(179,116,51,0.08);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card-content {
      padding: 14px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stars {
      color: #ffb400;
      font-size: 14px;
    }

    .list {
      width: min(760px, 90%);
      margin: 100px auto;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .cta {
      text-align: center;
      padding: 80px 20px;
    }

  </style>
</head>

<body>

<main class="frame">

  <div class="topbar">
    <div class="logo">FINDY</div>
    <button class="btn">상담하기</button>
  </div>

  <section class="hero">
    <h1>후기로 증명된 선택</h1>
    <p>실제 고객들의 리얼 후기</p>
  </section>

  <section class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/400x200">
      <div class="card-content">
        <div class="title">인생 눈썹 됐어요</div>
        <div class="stars">★★★★★</div>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x200">
      <div class="card-content">
        <div class="title">완전 자연스러워요</div>
        <div class="stars">★★★★★</div>
      </div>
    </div>

  </section>

  <section class="list">

    <div class="row">
      <span>“진짜 만족합니다”</span>
      <span>★★★★★</span>
    </div>

    <div class="row">
      <span>“친구들 다 추천했어요”</span>
      <span>★★★★★</span>
    </div>

  </section>

  <section class="cta">
    <h2>지금 상담 받아보세요</h2>
    <button class="btn">문의하기</button>
  </section>

</main>

</body>
</html>
