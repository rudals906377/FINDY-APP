<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FINDY 후기</title>

  <style>
    :root {
      --bg: #f6f6f6;
      --surface: #ffffff;
      --text: #B37433;
      --muted: #8a8178;
      --line: #e8ddd0;
      --accent: #B37433;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR";
      background: #dcdcdc;
      color: var(--text);
    }

    .frame {
      max-width: 1080px;
      margin: 24px auto;
      background: white;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 28px 56px 0;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
    }

    .hero {
      text-align: center;
      padding: 120px 40px 0;
    }

    .hero h1 {
      font-size: 56px;
      margin: 0;
    }

    .hero p {
      margin-top: 16px;
      color: var(--muted);
    }

    .review-grid {
      margin: 120px auto 0;
      width: min(760px, 90%);
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .review-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: white;
      transition: 0.2s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(179,116,51,0.1);
    }

    .review-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .review-content {
      padding: 16px;
    }

    .stars {
      color: #ffb400;
      margin-bottom: 6px;
    }

    .review-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .review-desc {
      font-size: 14px;
      color: var(--muted);
    }

    .review-list {
      width: min(760px, 90%);
      margin: 100px auto;
    }

    .review-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
    }

    .cta {
      text-align: center;
      padding: 80px 20px;
    }

    .cta button {
      padding: 14px 26px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: white;
      color: var(--accent);
      font-weight: bold;
      cursor: pointer;
    }

    .cta button:hover {
      background: var(--accent);
      color: white;
    }

  </style>
</head>

<body>
  <main class="frame">

    <div class="topbar">
      <div class="logo">FINDY</div>
    </div>

    <section class="hero">
      <h1>후기로 증명된 선택</h1>
      <p>실제 고객들의 리얼 후기</p>
    </section>

    <section class="review-grid">

      <div class="review-card">
        <img src="https://via.placeholder.com/400x200">
        <div class="review-content">
          <div class="stars">★★★★★</div>
          <div class="review-title">인생 눈썹 됐어요</div>
          <div class="review-desc">진짜 자연스럽고 너무 만족합니다</div>
        </div>
      </div>

      <div class="review-card">
        <img src="https://via.placeholder.com/400x200">
        <div class="review-content">
          <div class="stars">★★★★★</div>
          <div class="review-title">완전 추천합니다</div>
          <div class="review-desc">친절하고 결과 최고였어요</div>
        </div>
      </div>

    </section>

    <section class="review-list">

      <div class="review-row">
        <span>“재방문 무조건 합니다”</span>
        <span>★★★★★</span>
      </div>

      <div class="review-row">
        <span>“친구들 다 추천했어요”</span>
        <span>★★★★★</span>
      </div>

    </section>

    <section class="cta">
      <h2>지금 상담 받아보세요</h2>
      <button onclick="alert('카톡 연결 예정')">문의하기</button>
    </section>

  </main>
</body>
</html>
