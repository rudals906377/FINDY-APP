<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FINDY</title>
  <style>
    :root {
      --bg: #f6f6f6;
      --surface: #ffffff;
      --card: #ffffff;
      --text: #B37433;
      --muted: #8a8178;
      --line: #e8ddd0;
      --accent: #B37433;
      --accent-soft: #f6ede3;
      --pill: #B37433;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: #dcdcdc;
      color: var(--text);
    }

    .frame {
      max-width: 1080px;
      margin: 24px auto;
      background: var(--surface);
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 56px 0;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--accent);
    }

    .nav {
      display: flex;
      gap: 20px;
      font-size: 15px;
      color: var(--muted);
    }

    .download-btn {
      border: 1px solid var(--accent);
      background: #ffffff;
      color: var(--accent);
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .download-btn:hover {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .hero {
      padding: 130px 56px 0;
      text-align: center;
    }

    .hero h1 {
      margin: 0;
      font-size: 64px;
      line-height: 1.05;
      letter-spacing: -0.05em;
    }

    .search-wrap {
      width: min(680px, 100%);
      margin: 36px auto 0;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 14px 18px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(179, 116, 51, 0.12);
    }

    .search-icon {
      font-size: 22px;
      color: var(--accent);
      flex: 0 0 auto;
    }

    .search-input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 16px;
      background: transparent;
      color: var(--text);
    }

    .search-input::placeholder {
      color: #a6927f;
    }

    .category-grid {
      margin: 150px auto 0;
      width: min(760px, calc(100% - 80px));
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 34px 32px;
    }

    .category-card {
      text-align: center;
      padding: 18px 8px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #ffffff;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .category-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 10px 24px rgba(179, 116, 51, 0.08);
    }

    .category-icon {
      font-size: 40px;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 18px;
      display: block;
    }

    .category-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #111111;
    }

    .artist-list {
      width: min(760px, calc(100% - 80px));
      margin: 150px auto 0;
      padding-bottom: 60px;
    }

    .artist-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
      font-size: 18px;
    }

    .artist-role {
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 24px 24px 0;
      }

      .nav {
        display: none;
      }

      .hero {
        padding: 90px 24px 0;
      }

      .hero h1 {
        font-size: 44px;
      }

      .category-grid,
      .artist-list {
        width: calc(100% - 48px);
      }
    }

    @media (max-width: 640px) {
      .frame {
        margin: 0;
      }

      .hero h1 {
        font-size: 36px;
      }

      .search-wrap {
        padding: 12px 16px;
      }

      .category-grid {
        margin-top: 90px;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px 12px;
      }

      .artist-list {
        margin-top: 90px;
      }

      .artist-row {
        font-size: 15px;
        gap: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <header class="topbar">
      <div class="logo">FINDY</div>
      <nav class="nav">
        <span>홈</span>
        <span>디자이너</span>
        <span>스타일</span>
      </nav>
      <button class="download-btn">앱 다운로드</button>
    </header>

    <section class="hero">
      <h1>Find Your Beauty!</h1>

      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="text" placeholder="스타일 / 디자이너 / 지역 검색" />
      </div>
    </section>

    <section class="category-grid">
      <div class="category-card">
        <span class="category-icon">✂</span>
        <div class="category-name">헤어</div>
      </div>
      <div class="category-card">
        <span class="category-icon">✋</span>
        <div class="category-name">네일아트</div>
      </div>
      <div class="category-card">
        <span class="category-icon">👕</span>
        <div class="category-name">메이크업</div>
      </div>
      <div class="category-card">
        <span class="category-icon">📷</span>
        <div class="category-name">포토</div>
      </div>
      <div class="category-card">
        <span class="category-icon">🖌</span>
        <div class="category-name">반영구</div>
      </div>
      <div class="category-card">
        <span class="category-icon">✿</span>
        <div class="category-name">웨딩</div>
      </div>
      <div class="category-card">
        <span class="category-icon">👕</span>
        <div class="category-name">스타일링</div>
      </div>
      <div class="category-card">
        <span class="category-icon">□</span>
        <div class="category-name">빈칸</div>
      </div>
    </section>

    <section class="artist-list">
      <div class="artist-row">
        <span>Kim Seojin</span>
        <span class="artist-role">Hair Artist – 4.9★</span>
      </div>
      <div class="artist-row">
        <span>Lee Hyomin</span>
        <span class="artist-role">Makeup – 4.8★</span>
      </div>
      <div class="artist-row">
        <span>Park Daun</span>
        <span class="artist-role">Nail – 4.9★</span>
      </div>
      <div class="artist-row">
        <span>Han Yuri</span>
        <span class="artist-role">Photo – 4.7★</span>
      </div>
      <div class="artist-row">
        <span>Choi Nara</span>
        <span class="artist-role">Wedding – 4.8★</span>
      </div>
      <div class="artist-row">
        <span>Baek Minsu</span>
        <span class="artist-role">Semi-permanent – 4.7★</span>
      </div>
    </section>
  </main>
</body>
</html>
